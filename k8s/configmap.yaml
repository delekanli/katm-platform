apiVersion: v1
kind: ConfigMap
metadata:
  name: katm-config
  namespace: katm
data:
  # Oracle Database (external)
  DB_HOST: "exa-scan.katm.local"
  DB_PORT: "1521"
  DB_SERVICE: "exkrdb"
  # Kafka (internal K8s service)
  KAFKA_SERVERS: "kafka:9092"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  # Keycloak (internal K8s service)
  KEYCLOAK_URL: "http://keycloak:8080"
  # Redis (internal K8s service)
  REDIS_HOST: "redis"
  # MinIO / S3 (internal K8s service)
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET_NAME: "katm-files"
  S3_REGION: "us-east-1"
  # Zipkin (internal K8s service)
  ZIPKIN_URL: "http://zipkin:9411"
  # MIP service (internal K8s service)
  MIP_SERVICE_URL: "http://katm-mip:8089"
  # SMTP
  SMTP_HOST: "mail.katm.local"
  SMTP_PORT: "465"
  SMTP_USER: "bi@katm.local"
  # SMS
  SMS_PROVIDER_URL: "https://send.smsxabar.uz/broker-api/send"
  SMS_USERNAME: "kreditbyuro"
  SMS_SENDER: "KATM.GOV.UZ"
