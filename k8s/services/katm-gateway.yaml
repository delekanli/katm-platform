apiVersion: apps/v1
kind: Deployment
metadata:
  name: katm-gateway
  namespace: katm
  labels:
    app: katm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katm-gateway
  template:
    metadata:
      labels:
        app: katm-gateway
    spec:
      containers:
        - name: katm-gateway
          image: katm/katm-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: katm-config
            - secretRef:
                name: katm-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: katm-gateway
  namespace: katm
spec:
  type: LoadBalancer
  selector:
    app: katm-gateway
  ports:
    - port: 80
      targetPort: 8080
