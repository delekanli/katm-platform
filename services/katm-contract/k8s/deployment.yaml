apiVersion: apps/v1
kind: Deployment
metadata:
  name: katm-contract
  namespace: katm
  labels:
    app: katm-contract
spec:
  replicas: 2
  selector:
    matchLabels:
      app: katm-contract
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: katm-contract
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: katm-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: katm-contract
          image: registry.katm.gov.uz/katm/katm-contract:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ORACLE_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ORACLE_PORT
            - name: DB_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ORACLE_SERVICE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: db-password
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: KAFKA_SERVERS
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: KEYCLOAK_URL
            - name: ZIPKIN_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ZIPKIN_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      imagePullSecrets:
        - name: registry-credentials
