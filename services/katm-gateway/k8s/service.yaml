apiVersion: v1
kind: Service
metadata:
  name: katm-gateway
  namespace: katm
  labels:
    app: katm-gateway
spec:
  type: ClusterIP
  selector:
    app: katm-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: katm-gateway-hpa
  namespace: katm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: katm-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
