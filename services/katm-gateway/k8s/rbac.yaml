apiVersion: v1
kind: ServiceAccount
metadata:
  name: katm-gateway
  namespace: katm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: katm-gateway
  namespace: katm
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: katm-gateway
  namespace: katm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: katm-gateway
subjects:
  - kind: ServiceAccount
    name: katm-gateway
    namespace: katm
