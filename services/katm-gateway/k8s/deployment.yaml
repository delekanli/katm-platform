apiVersion: apps/v1
kind: Deployment
metadata:
  name: katm-gateway
  namespace: katm
  labels:
    app: katm-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: katm-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: katm-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: katm-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: katm-gateway
          image: registry.katm.gov.uz/katm/katm-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: KEYCLOAK_URL
            - name: ZIPKIN_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ZIPKIN_URL
            - name: AUTH_SERVICE_URL
              value: "http://katm-auth:8081"
            - name: ACCESS_CHECK_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      imagePullSecrets:
        - name: registry-credentials
