server:
  port: 8080

spring:
  application:
    name: katm-gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.health.DataSourceHealthContributorAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm
  cloud:
    kubernetes:
      enabled: ${SPRING_CLOUD_KUBERNETES_ENABLED:false}
      discovery:
        enabled: ${SPRING_CLOUD_KUBERNETES_DISCOVERY_ENABLED:false}
        all-namespaces: false
      loadbalancer:
        enabled: ${SPRING_CLOUD_KUBERNETES_LOADBALANCER_ENABLED:false}
        mode: SERVICE
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            # --- Business services ---
            - id: katm-auth
              uri: ${KATM_AUTH_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=0
            - id: katm-client
              uri: ${KATM_CLIENT_URL:http://localhost:8087}
              predicates:
                - Path=/api/v1/clients/**
              filters:
                - StripPrefix=0
            - id: katm-claim
              uri: ${KATM_CLAIM_URL:http://localhost:8085}
              predicates:
                - Path=/api/v1/claims/**
              filters:
                - StripPrefix=0
            - id: katm-contract
              uri: ${KATM_CONTRACT_URL:http://localhost:8086}
              predicates:
                - Path=/api/v1/contracts/**
              filters:
                - StripPrefix=0
            - id: katm-report
              uri: ${KATM_REPORT_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/reports/**
              filters:
                - StripPrefix=0
            - id: katm-notification
              uri: ${KATM_NOTIFICATION_URL:http://localhost:8088}
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - StripPrefix=0
            - id: katm-mip
              uri: ${KATM_MIP_URL:http://localhost:8089}
              predicates:
                - Path=/api/v1/mip/**
              filters:
                - StripPrefix=0
            - id: katm-scheduler
              uri: ${KATM_SCHEDULER_URL:http://localhost:8091}
              predicates:
                - Path=/api/v1/scheduler/**
              filters:
                - StripPrefix=0
            - id: katm-reference
              uri: ${KATM_REFERENCE_URL:http://localhost:8090}
              predicates:
                - Path=/api/v1/reference/**
              filters:
                - StripPrefix=0
            - id: katm-registry
              uri: ${KATM_REGISTRY_URL:http://localhost:8092}
              predicates:
                - Path=/api/v1/registry/**
              filters:
                - StripPrefix=0
            - id: katm-ucin
              uri: ${KATM_UCIN_URL:http://localhost:8094}
              predicates:
                - Path=/api/v1/ucin/**
              filters:
                - StripPrefix=0
            - id: katm-egov
              uri: ${KATM_EGOV_URL:http://localhost:8093}
              predicates:
                - Path=/api/v1/egov/**
              filters:
                - StripPrefix=0
            - id: katm-analytics
              uri: ${KATM_ANALYTICS_URL:http://localhost:8095}
              predicates:
                - Path=/api/v1/analytics/**
              filters:
                - StripPrefix=0
            - id: katm-system
              uri: ${KATM_SYSTEM_URL:http://localhost:8096}
              predicates:
                - Path=/api/v1/system/**
              filters:
                - StripPrefix=0
            # --- Swagger aggregation ---
            - id: swagger-auth
              uri: ${KATM_AUTH_URL:http://localhost:8081}
              predicates:
                - Path=/v3/api-docs/auth
              filters:
                - RewritePath=/v3/api-docs/auth, /v3/api-docs
            - id: swagger-client
              uri: ${KATM_CLIENT_URL:http://localhost:8087}
              predicates:
                - Path=/v3/api-docs/client
              filters:
                - RewritePath=/v3/api-docs/client, /v3/api-docs
            - id: swagger-claim
              uri: ${KATM_CLAIM_URL:http://localhost:8085}
              predicates:
                - Path=/v3/api-docs/claim
              filters:
                - RewritePath=/v3/api-docs/claim, /v3/api-docs
            - id: swagger-contract
              uri: ${KATM_CONTRACT_URL:http://localhost:8086}
              predicates:
                - Path=/v3/api-docs/contract
              filters:
                - RewritePath=/v3/api-docs/contract, /v3/api-docs
            - id: swagger-report
              uri: ${KATM_REPORT_URL:http://localhost:8084}
              predicates:
                - Path=/v3/api-docs/report
              filters:
                - RewritePath=/v3/api-docs/report, /v3/api-docs
            - id: swagger-notification
              uri: ${KATM_NOTIFICATION_URL:http://localhost:8088}
              predicates:
                - Path=/v3/api-docs/notification
              filters:
                - RewritePath=/v3/api-docs/notification, /v3/api-docs
            - id: swagger-mip
              uri: ${KATM_MIP_URL:http://localhost:8089}
              predicates:
                - Path=/v3/api-docs/mip
              filters:
                - RewritePath=/v3/api-docs/mip, /v3/api-docs
            - id: swagger-scheduler
              uri: ${KATM_SCHEDULER_URL:http://localhost:8091}
              predicates:
                - Path=/v3/api-docs/scheduler
              filters:
                - RewritePath=/v3/api-docs/scheduler, /v3/api-docs
            - id: swagger-reference
              uri: ${KATM_REFERENCE_URL:http://localhost:8090}
              predicates:
                - Path=/v3/api-docs/reference
              filters:
                - RewritePath=/v3/api-docs/reference, /v3/api-docs
            - id: swagger-registry
              uri: ${KATM_REGISTRY_URL:http://localhost:8092}
              predicates:
                - Path=/v3/api-docs/registry
              filters:
                - RewritePath=/v3/api-docs/registry, /v3/api-docs
            - id: swagger-ucin
              uri: ${KATM_UCIN_URL:http://localhost:8094}
              predicates:
                - Path=/v3/api-docs/ucin
              filters:
                - RewritePath=/v3/api-docs/ucin, /v3/api-docs
            - id: swagger-egov
              uri: ${KATM_EGOV_URL:http://localhost:8093}
              predicates:
                - Path=/v3/api-docs/egov
              filters:
                - RewritePath=/v3/api-docs/egov, /v3/api-docs
            - id: swagger-analytics
              uri: ${KATM_ANALYTICS_URL:http://localhost:8095}
              predicates:
                - Path=/v3/api-docs/analytics
              filters:
                - RewritePath=/v3/api-docs/analytics, /v3/api-docs
            - id: swagger-system
              uri: ${KATM_SYSTEM_URL:http://localhost:8096}
              predicates:
                - Path=/v3/api-docs/system
              filters:
                - RewritePath=/v3/api-docs/system, /v3/api-docs

katm:
  auth-service.url: ${AUTH_SERVICE_URL:http://localhost:8081}
  access-check.enabled: ${ACCESS_CHECK_ENABLED:true}

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth
      - name: Client Service
        url: /v3/api-docs/client
      - name: Claim Service
        url: /v3/api-docs/claim
      - name: Contract Service
        url: /v3/api-docs/contract
      - name: Report Service
        url: /v3/api-docs/report
      - name: Notification Service
        url: /v3/api-docs/notification
      - name: MIP Service
        url: /v3/api-docs/mip
      - name: Scheduler Service
        url: /v3/api-docs/scheduler
      - name: Reference Service
        url: /v3/api-docs/reference
      - name: Registry Service
        url: /v3/api-docs/registry
      - name: UCIN Service
        url: /v3/api-docs/ucin
      - name: E-GOV Service
        url: /v3/api-docs/egov
      - name: Analytics Service
        url: /v3/api-docs/analytics
      - name: System Service
        url: /v3/api-docs/system
    urls-primary-name: Auth Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

logging:
  level:
    uz.katm.gateway: INFO
    reactor.netty.http.client: WARN
