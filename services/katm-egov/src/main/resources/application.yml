server:
  port: 8093

spring:
  application:
    name: katm-egov
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:KATMDB}
    username: ${DB_USER:katm_egov}
    password: ${DB_PASSWORD:katm_pass}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm

katm:
  ucin-service:
    url: ${UCIN_SERVICE_URL:http://localhost:8094}
  service-auth:
    token-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm/protocol/openid-connect/token
    client-id: ${SERVICE_CLIENT_ID:katm-service}
    client-secret: ${SERVICE_CLIENT_SECRET:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.katm.egov: INFO
