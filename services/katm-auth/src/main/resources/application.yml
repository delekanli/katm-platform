server:
  port: 8081

spring:
  application:
    name: katm-auth
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:KATMDB}
    username: ${DB_USER:katm}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

katm:
  auth:
    keycloak-url: ${KEYCLOAK_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:katm}
    client-id: ${KEYCLOAK_CLIENT_ID:katm-service}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.katm.auth: INFO
    org.springframework.security: INFO
