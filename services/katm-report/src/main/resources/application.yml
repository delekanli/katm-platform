server:
  port: 8084

spring:
  application:
    name: katm-report
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:KATMDB}
    username: ${DB_USER:katm_report}
    password: ${DB_PASSWORD:katm_pass}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: katm-report-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "uz.katm.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}
  bucket-name: katm-files
  region: us-east-1

katm:
  fcbk:
    url: ${FCBK_FICO_URL:}
    username: ${FCBK_FICO_USERNAME:}
    password: ${FCBK_FICO_PASSWORD:}
  # Мониторинговый сервис UzCard (JSON-RPC card.counts.get). Перенос настроек UZCARD_SERVICE
  # (в монолите — DB ExternalServiceSettings; в новой платформе — конфиг + env, BasicAuth + Host).
  report:
    uzcard:
      url: ${UZCARD_URL:}
      host: ${UZCARD_HOST:monitoring.uzcard.uz}
      username: ${UZCARD_USER:}
      password: ${UZCARD_PASSWORD:}
    # HUMO (Bearer-токен) — перенос HUMO_SERVICE
    humo:
      cards-url: ${HUMO_CARDS_URL:}
      scoring-url: ${HUMO_SCORING_URL:}
      token: ${HUMO_TOKEN:}
    # Beeline (OAuth) — перенос BEELINE_AUTH/SCOR/GET_PHONE/VERIF_SERVICE
    beeline:
      auth:
        url: ${BEELINE_AUTH_URL:}
        username: ${BEELINE_AUTH_USER:}
        password: ${BEELINE_AUTH_PASSWORD:}
        client-id: ${BEELINE_CLIENT_ID:}
        client-secret: ${BEELINE_CLIENT_SECRET:}
      scor:
        url: ${BEELINE_SCOR_URL:}
        url-check: ${BEELINE_SCOR_URL_CHECK:}
      phones:
        url: ${BEELINE_PHONES_URL:}
        url-check: ${BEELINE_PHONES_URL_CHECK:}
      verif:
        url: ${BEELINE_VERIF_URL:}
        url-check: ${BEELINE_VERIF_URL_CHECK:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
