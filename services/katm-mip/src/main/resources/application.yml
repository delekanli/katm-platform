server:
  port: 8089

spring:
  application:
    name: katm-mip
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.JdbcTemplateAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 минут
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: katm-mip-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "uz.katm.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

katm:
  mip:
    ws-id: ${MIP_WS_ID:KATM}
    connect-timeout: 10000
    read-timeout: 30000
    citizen-endpoint: ${MIP_CITIZEN_ENDPOINT:}
    citizens-batch-endpoint: ${MIP_CITIZENS_BATCH_ENDPOINT:}
    doc-endpoint: ${MIP_DOC_ENDPOINT:}
    tax-endpoint: ${MIP_TAX_ENDPOINT:}
    tax-by-tin-endpoint: ${MIP_TAX_BY_TIN_ENDPOINT:}
    tin-endpoint: ${MIP_TIN_ENDPOINT:}
    tin-old-endpoint: ${MIP_TIN_OLD_ENDPOINT:}
    full-tin-endpoint: ${MIP_FULL_TIN_ENDPOINT:}
    tax-objects-endpoint: ${MIP_TAX_OBJECTS_ENDPOINT:}
    pay-insur-endpoint: ${MIP_PAY_INSUR_ENDPOINT:}
    debt-endpoint: ${MIP_DEBT_ENDPOINT:}
    # Адресные справочники (фаза 2)
    region-endpoint: ${MIP_REGION_ENDPOINT:}
    district-endpoint: ${MIP_DISTRICT_ENDPOINT:}
    place-endpoint: ${MIP_PLACE_ENDPOINT:}
    street-endpoint: ${MIP_STREET_ENDPOINT:}
    # Юрлица (фаза 3)
    legal-endpoint: ${MIP_LEGAL_ENDPOINT:}
    legal-br-endpoint: ${MIP_LEGAL_BR_ENDPOINT:}
    # Пенсии / ИНПС (фаза 4)
    inps-endpoint: ${MIP_INPS_ENDPOINT:}
    pension-assign-endpoint: ${MIP_PENSION_ASSIGN_ENDPOINT:}
    pension-size-endpoint: ${MIP_PENSION_SIZE_ENDPOINT:}
    pension-req-endpoint: ${MIP_PENSION_REQ_ENDPOINT:}
    # Долги МИБ / водоконтроль (фаза 5) — креды через конфиг
    debtor-endpoint: ${MIP_DEBTOR_ENDPOINT:}
    debtor:
      username: ${MIP_DEBTOR_USERNAME:}
      password: ${MIP_DEBTOR_PASSWORD:}
    water-endpoint: ${MIP_WATER_ENDPOINT:}
    water:
      username: ${MIP_WATER_USERNAME:}
      password: ${MIP_WATER_PASSWORD:}
    # ГЦП / MIP2 REST (фаза 6) — использует OAuth-токен ПЦД (фаза 7)
    gcp:
      person-doc-url: ${MIP_GCP_PERSON_DOC_URL:}
    # PCD / МИБ (фаза 7): сквозной REST-доступ через OAuth2 (grant_type=password)
    pcd:
      oauth-url: ${MIP_PCD_OAUTH_URL:}
      oauth-username: ${MIP_PCD_OAUTH_USERNAME:}
      oauth-password: ${MIP_PCD_OAUTH_PASSWORD:}
      client-username: ${MIP_PCD_CLIENT_USERNAME:}
      client-password: ${MIP_PCD_CLIENT_PASSWORD:}
    # Отчёты ГНК через ПЦД (перенос настроек TAX_SERVICE.* и GNK_SERVICE монолита)
    gnk:
      salary-url: ${MIP_GNK_SALARY_URL:}
      dividend-url: ${MIP_GNK_DIVIDEND_URL:}
      rent-url: ${MIP_GNK_RENT_URL:}
      account-report-1-url: ${MIP_GNK_ACCOUNT_REPORT_1_URL:}
      account-report-2-url: ${MIP_GNK_ACCOUNT_REPORT_2_URL:}
      ip-info-url: ${MIP_GNK_IP_INFO_URL:}
      info-url: ${MIP_GNK_INFO_URL:}
      pe-info-url: ${MIP_GNK_PE_INFO_URL:}
      juridical-info-url: ${MIP_GNK_JURIDICAL_INFO_URL:}
      pe-subject-url: ${MIP_GNK_PE_SUBJECT_URL:}
      tax-report-url: ${MIP_GNK_TAX_REPORT_URL:}
      staff-count-url: ${MIP_GNK_STAFF_COUNT_URL:}
      nds-url: ${MIP_GNK_NDS_URL:}
      self-employment-url: ${MIP_GNK_SELF_EMPLOYMENT_URL:}
    # MIP2 через ПЦД: ЗАГС/МинТруд/алименты/МинЗдрав/авто/судимость
    # (перенос JUSTICE_*_SERVICE, LABOUR/ALIMENT/NARKO/PSYCHO/VEHICLE_INFO/CONVICTION_SERVICE)
    mip2:
      justice-birth-url: ${MIP_JUSTICE_BIRTH_URL:}
      justice-marriage-url: ${MIP_JUSTICE_MARRIAGE_URL:}
      justice-divorce-url: ${MIP_JUSTICE_DIVORCE_URL:}
      justice-death-url: ${MIP_JUSTICE_DEATH_URL:}
      labour-url: ${MIP_LABOUR_URL:}
      aliment-url: ${MIP_ALIMENT_URL:}
      narko-url: ${MIP_NARKO_URL:}
      psycho-url: ${MIP_PSYCHO_URL:}
      vehicle-url: ${MIP_VEHICLE_URL:}
      conviction-url: ${MIP_CONVICTION_URL:}
      conviction-check-url: ${MIP_CONVICTION_CHECK_URL:}
    # МИБ (Бюро принудительного исполнения) через ПЦД
    # (перенос MIB_SERVICE_*_BAN / _DOC_* / SERVICE_LIST_*_INSOLVENT)
    mib:
      debt-ban-url: ${MIP_MIB_DEBT_BAN_URL:}
      avto-ban-url: ${MIP_MIB_AVTO_BAN_URL:}
      realty-ban-url: ${MIP_MIB_REALTY_BAN_URL:}
      doc-avto-url: ${MIP_MIB_DOC_AVTO_URL:}
      doc-creditor-url: ${MIP_MIB_DOC_CREDITOR_URL:}
      doc-debtor-url: ${MIP_MIB_DOC_DEBTOR_URL:}
      doc-action-url: ${MIP_MIB_DOC_ACTION_URL:}
      list-pe-insolvent-url: ${MIP_MIB_LIST_PE_INSOLVENT_URL:}
      list-le-insolvent-url: ${MIP_MIB_LIST_LE_INSOLVENT_URL:}
    # Коммунальные задолженности через ПЦД (перенос ELECTRO/GAS/CLEAN_CITY/TOSHISSIQQUVVAT_SERVICE)
    utility:
      electro-url: ${MIP_UTILITY_ELECTRO_URL:}
      gas-url: ${MIP_UTILITY_GAS_URL:}
      ecology-url: ${MIP_UTILITY_ECOLOGY_URL:}
      toshissiqquvvat-url: ${MIP_UTILITY_TOSHISSIQQUVVAT_URL:}
    # Кадастр — собственный HTTP с BasicAuth (перенос CADASTRE_SERVICE)
    cadastre:
      url: ${MIP_CADASTRE_URL:}
      username: ${MIP_CADASTRE_USERNAME:}
      password: ${MIP_CADASTRE_PASSWORD:}
    # Прочее через ПЦД: Мой дом, E-Invoice ККМ физ/юр, кэшбек (MY_HOME_SERVICE, TAX_SERVICE.*)
    misc:
      my-home-url: ${MIP_MY_HOME_URL:}
      einvoice-pe-url: ${MIP_EINVOICE_PE_URL:}
      einvoice-le-url: ${MIP_EINVOICE_LE_URL:}
      cashback-url: ${MIP_CASHBACK_URL:}
    # UZ-ASBO — собственный HTTP с BasicAuth (перенос UZ_ASBO_SERVICE)
    uzasbo:
      url: ${MIP_UZASBO_URL:}
      url-check: ${MIP_UZASBO_URL_CHECK:}
      username: ${MIP_UZASBO_USERNAME:}
      password: ${MIP_UZASBO_PASSWORD:}
  http:
    ssl-verify: ${KATM_HTTP_SSL_VERIFY:true}

# Resilience4j: ретраи и circuit breaker для нестабильных госсервисов
resilience4j:
  retry:
    instances:
      pcd:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - uz.katm.mip.exception.MipTransientException
  circuitbreaker:
    instances:
      pcd:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.katm.mip: INFO
    org.springframework.ws: WARN
