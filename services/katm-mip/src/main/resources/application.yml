server:
  port: 8089

spring:
  application:
    name: katm-mip
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.JdbcTemplateAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 минут
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: katm-mip-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "uz.katm.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

katm:
  mip:
    ws-id: ${MIP_WS_ID:KATM}
    connect-timeout: 10000
    read-timeout: 30000
    citizen-endpoint: ${MIP_CITIZEN_ENDPOINT:}
    doc-endpoint: ${MIP_DOC_ENDPOINT:}
    tax-endpoint: ${MIP_TAX_ENDPOINT:}
    tin-endpoint: ${MIP_TIN_ENDPOINT:}
    debt-endpoint: ${MIP_DEBT_ENDPOINT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.katm.mip: INFO
    org.springframework.ws: WARN
