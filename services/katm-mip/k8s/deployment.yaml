apiVersion: apps/v1
kind: Deployment
metadata:
  name: katm-mip
  namespace: katm
  labels:
    app: katm-mip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: katm-mip
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: katm-mip
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8089"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: katm-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: katm-mip
          image: registry.katm.gov.uz/katm/katm-mip:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: KAFKA_SERVERS
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: KEYCLOAK_URL
            - name: MIP_WS_ID
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-ws-id
            - name: MIP_CITIZEN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-citizen-endpoint
            - name: MIP_DOC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-doc-endpoint
            - name: MIP_TAX_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-tax-endpoint
            - name: MIP_TIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-tin-endpoint
            - name: MIP_DEBT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: katm-secrets
                  key: mip-debt-endpoint
            - name: ZIPKIN_URL
              valueFrom:
                configMapKeyRef:
                  name: katm-config
                  key: ZIPKIN_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      imagePullSecrets:
        - name: registry-credentials
