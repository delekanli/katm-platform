server:
  port: 8087

spring:
  application:
    name: katm-client
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:KATMDB}
    username: ${DB_USER:katm_client}
    password: ${DB_PASSWORD:katm_pass}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
  cache:
    type: redis
    redis:
      time-to-live: 1800000
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: katm-client-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "uz.katm.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}
  bucket-name: katm-files
  region: us-east-1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}

resilience4j:
  circuitbreaker:
    instances:
      mip:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
  retry:
    instances:
      mip:
        max-attempts: 3
        wait-duration: 500ms

katm:
  mip-service:
    url: ${MIP_SERVICE_URL:http://localhost:8089}
  service-auth:
    token-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/katm/protocol/openid-connect/token
    client-id: ${SERVICE_CLIENT_ID:katm-service}
    client-secret: ${SERVICE_CLIENT_SECRET:changeme}
  # Отчисления ИНПС через Халк банк (перенос настроек INPS_SERVICE_CHECK / INPS_SERVICE / INPS_SERVICE_1).
  # В монолите хранились в БД (ExternalServiceSettings); в новой платформе — конфиг + env (BasicAuth).
  client:
    inps:
      check:
        url: ${INPS_CHECK_URL:}
        username: ${INPS_CHECK_USER:}
        password: ${INPS_CHECK_PASSWORD:}
      scor:
        url: ${INPS_SCOR_URL:}
        username: ${INPS_SCOR_USER:}
        password: ${INPS_SCOR_PASSWORD:}
      inps:
        url: ${INPS_URL:}
        username: ${INPS_USER:}
        password: ${INPS_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
